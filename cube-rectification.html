<script id="worker-src" type="text/worker">
// ============================================================================
// worker.js — Topologische Rektifikation eines Würfels
// ============================================================================
//
// Dieses Modul implementiert die iterierte Rektifikation als Web Worker,
// d.h. die gesamte Berechnung läuft in einem eigenen Thread und blockiert
// nicht die UI.
//
// ANSATZ: Statt den Convex Hull zu berechnen und daraus Kanten zu extrahieren
// (was bei fast-sphärischen Körpern durch Koplanaritäts-Schwellwerte ungenau
// wird), führen wir die Flächen-Topologie explizit mit. Flächen sind Polygone
// (nicht Dreiecke), Kanten ergeben sich direkt aus den Flächen.
//
// REKTIFIKATION: Bei jedem Schritt werden zwei Typen neuer Flächen erzeugt:
//   1. Geschrumpfte Original-Flächen: Die Kantenmittelpunkte jeder alten
//      Fläche bilden eine neue (kleinere) Fläche gleicher Seitenanzahl.
//   2. Vertex-Figuren: Die Kantenmittelpunkte aller Kanten, die an einem
//      alten Vertex enden, bilden eine neue Fläche (Grad des Vertex = Seitenanzahl).
//
// EULER-FORMEL: V' = E, E' = 2E, F' = V + F (exakt, keine Approximation).
//
// NORMALISIERUNG: Durch den Durchschnittsradius (rAvg) statt maxR.
//   maxR-Normalisierung erzeugt einen nicht-sphärischen Fixpunkt,
//   weil die Beulen (an den Würfelecken) immer auf r=1 zurückgesetzt werden.
//   rAvg-Normalisierung erlaubt sowohl Beulen als auch Dellen zu schrumpfen.
// ============================================================================

// Alle YIELD_EVERY Schritte wird der Event-Loop freigegeben, damit
// Fortschrittsmeldungen (postMessage) tatsächlich zugestellt werden.
const YIELD_EVERY = 100;
function yield_() { return new Promise(r => setTimeout(r, 0)); }

// ============================================================================
// Ausgangskörper: Einheitswürfel
// ============================================================================
// 8 Vertices an den Ecken des Würfels mit Kantenlänge 2, zentriert am Ursprung.
// Jede Fläche ist ein Quadrat (4 Vertices), Reihenfolge gegen den Uhrzeigersinn
// von außen betrachtet.
const CUBE_VERTS = [
  [-1,-1,-1], // 0: links  unten hinten
  [-1,-1, 1], // 1: links  unten vorne
  [-1, 1,-1], // 2: links  oben  hinten
  [-1, 1, 1], // 3: links  oben  vorne
  [ 1,-1,-1], // 4: rechts unten hinten
  [ 1,-1, 1], // 5: rechts unten vorne
  [ 1, 1,-1], // 6: rechts oben  hinten
  [ 1, 1, 1], // 7: rechts oben  vorne
];
const CUBE_FACES = [
  [0,1,3,2], // -x Fläche (links)
  [4,6,7,5], // +x Fläche (rechts)
  [0,4,5,1], // -y Fläche (unten)
  [2,3,7,6], // +y Fläche (oben)
  [0,2,6,4], // -z Fläche (hinten)
  [1,5,7,3], // +z Fläche (vorne)
];

// Erzeugt einen eindeutigen String-Schlüssel für eine Kante zwischen
// Vertex a und b, unabhängig von der Reihenfolge.
function edgeKey(a, b) { return a < b ? a + '_' + b : b + '_' + a; }

// ============================================================================
// Kernalgorithmus: Topologische Rektifikation
// ============================================================================
// Eingabe:
//   vertices: Array von [x, y, z]-Koordinaten
//   faces:    Array von Polygon-Flächen (jede Fläche = Array von Vertex-Indizes)
//
// Ausgabe:
//   vertices: Neue Vertex-Koordinaten (Kantenmittelpunkte)
//   faces:    Neue Polygon-Flächen (geschrumpfte + Vertex-Figuren)
//   triIndices: Triangulierte Flächen für Three.js-Rendering
//   coords:   Flat Float64Array der Koordinaten (für Transferable)
//   deviations: Abstand jedes Vertex von der Best-Fit-Kugel
//   rAvg:     Durchschnittsradius (= Radius der Best-Fit-Kugel)
async function rectifyTopological(vertices, faces, onProgress) {

  // ----------------------------------------------------------
  // SCHRITT 1: Kanten sammeln und Mittelpunkte berechnen
  // ----------------------------------------------------------
  // Jede Kante des Polyeders wird genau einmal erfasst.
  // Der Mittelpunkt wird als neuer Vertex gespeichert.
  // edgeMidIdx: edge_key → Index des Mittelpunkts in newVertices
  const edgeMidIdx = new Map();
  const newVertices = [];

  for (const face of faces) {
    for (let j = 0; j < face.length; j++) {
      const a = face[j], b = face[(j + 1) % face.length];
      const key = edgeKey(a, b);
      if (!edgeMidIdx.has(key)) {
        const mx = (vertices[a][0] + vertices[b][0]) / 2;
        const my = (vertices[a][1] + vertices[b][1]) / 2;
        const mz = (vertices[a][2] + vertices[b][2]) / 2;
        edgeMidIdx.set(key, newVertices.length);
        newVertices.push([mx, my, mz]);
      }
    }
  }

  // ----------------------------------------------------------
  // SCHRITT 2: Kante → Flächen Zuordnung
  // ----------------------------------------------------------
  // Jede Kante grenzt an genau 2 Flächen (geschlossenes Polyeder).
  // Diese Information brauchen wir in Schritt 4, um die Kanten
  // um einen Vertex in der richtigen Reihenfolge zu ordnen.
  const edgeFaces = new Map(); // edge_key → [faceIdx, faceIdx]
  for (let fi = 0; fi < faces.length; fi++) {
    const face = faces[fi];
    for (let j = 0; j < face.length; j++) {
      const a = face[j], b = face[(j + 1) % face.length];
      const key = edgeKey(a, b);
      if (!edgeFaces.has(key)) edgeFaces.set(key, []);
      edgeFaces.get(key).push(fi);
    }
  }

  const newFaces = [];

  // ----------------------------------------------------------
  // SCHRITT 3: Geschrumpfte Flächen
  // ----------------------------------------------------------
  // Jede alte n-Eck-Fläche wird zu einem neuen n-Eck,
  // dessen Ecken die Mittelpunkte der alten Kanten sind.
  // Beispiel: Quadrat → kleineres Quadrat, Dreieck → kleineres Dreieck.
  for (const face of faces) {
    const newFace = [];
    for (let j = 0; j < face.length; j++) {
      const a = face[j], b = face[(j + 1) % face.length];
      newFace.push(edgeMidIdx.get(edgeKey(a, b)));
    }
    newFaces.push(newFace);
  }

  // ----------------------------------------------------------
  // SCHRITT 4: Vertex-Figuren
  // ----------------------------------------------------------
  // Für jeden alten Vertex mit Grad d (d angrenzende Kanten) entsteht
  // ein neues d-Eck aus den Mittelpunkten dieser Kanten.
  //
  // Die Kanten müssen in der richtigen zyklischen Reihenfolge um den
  // Vertex angeordnet werden. Dazu gehen wir von einer beliebigen
  // Startkante über gemeinsame Flächen zur jeweils nächsten Kante.
  //
  // Beispiel: Würfel-Ecke hat Grad 3 → Dreieck
  //           Kuboctaeder hat Vertices mit Grad 4 → Quadrat

  // Erst: für jeden Vertex die Liste seiner Kanten sammeln
  const vertexEdges = new Map(); // vertex → [edge_keys]
  for (const [key] of edgeMidIdx) {
    const [a, b] = key.split('_').map(Number);
    for (const v of [a, b]) {
      if (!vertexEdges.has(v)) vertexEdges.set(v, []);
      vertexEdges.get(v).push(key);
    }
  }

  let processed = 0;
  const totalVerts = vertexEdges.size;

  for (const [v, eKeys] of vertexEdges) {
    processed++;
    if (processed % YIELD_EVERY === 0) {
      if (onProgress) onProgress('topo', processed, totalVerts);
      await yield_();
    }

    // Kanten zyklisch ordnen via Flächen-Adjazenz:
    // Start bei beliebiger Kante, dann über die gemeinsame Fläche
    // die nächste Kante finden, die ebenfalls an v endet.
    const ordered = [eKeys[0]];
    const used = new Set([eKeys[0]]);

    while (ordered.length < eKeys.length) {
      const lastKey = ordered[ordered.length - 1];
      const lastFaces = edgeFaces.get(lastKey);

      let found = false;
      for (const fi of lastFaces) {
        const face = faces[fi];
        // Suche in dieser Fläche die andere Kante, die an v endet
        for (let j = 0; j < face.length; j++) {
          const a = face[j], b = face[(j + 1) % face.length];
          if (a !== v && b !== v) continue; // Kante berührt v nicht
          const key = edgeKey(a, b);
          if (key !== lastKey && !used.has(key) && edgeMidIdx.has(key)) {
            ordered.push(key);
            used.add(key);
            found = true;
            break;
          }
        }
        if (found) break;
      }
      if (!found) break; // Sollte bei geschlossenem Polyeder nicht passieren
    }

    // Vertex-Figur: die Mittelpunkte der geordneten Kanten
    const vertexFace = ordered.map(key => edgeMidIdx.get(key));
    newFaces.push(vertexFace);
  }

  // ----------------------------------------------------------
  // SCHRITT 5: Normalisierung durch Durchschnittsradius
  // ----------------------------------------------------------
  // Alle Vertices werden so skaliert, dass ihr durchschnittlicher
  // Abstand vom Ursprung = 1 ist.
  //
  // WARUM NICHT maxR? maxR-Normalisierung (teile durch den am weitesten
  // entfernten Punkt) erzeugt einen nicht-sphärischen Fixpunkt: die
  // Beulen an den Würfelecken werden immer auf r=1 zurückgesetzt und
  // können nie schrumpfen. rAvg-Normalisierung erlaubt symmetrisches
  // Schrumpfen von Beulen UND Dellen.
  let rSum = 0;
  for (const v of newVertices) {
    rSum += Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
  }
  const rAvg = rSum / newVertices.length;
  if (rAvg > 1e-12) {
    for (const v of newVertices) {
      v[0] /= rAvg; v[1] /= rAvg; v[2] /= rAvg;
    }
  }

  // ----------------------------------------------------------
  // SCHRITT 6: Abweichungen von der Best-Fit-Kugel
  // ----------------------------------------------------------
  // Nach rAvg-Normalisierung hat die Best-Fit-Kugel Radius 1.
  // deviation > 0: Punkt liegt innerhalb der Kugel (Delle)
  // deviation < 0: Punkt liegt außerhalb der Kugel (Beule)
  const deviations = new Float64Array(newVertices.length);
  for (let i = 0; i < newVertices.length; i++) {
    const v = newVertices[i];
    deviations[i] = 1 - Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
  }

  // ----------------------------------------------------------
  // SCHRITT 7: Triangulierung für Rendering
  // ----------------------------------------------------------
  // Three.js braucht Dreiecke, keine Polygone. Wir verwenden
  // Fan-Triangulierung: ein Polygon mit n Ecken wird zu n-2 Dreiecken.
  //
  // Die Winding-Order (Reihenfolge der Vertices) bestimmt die
  // Richtung der Flächennormale. Wir orientieren alle Dreiecke so,
  // dass die Normale nach außen zeigt (weg vom Ursprung).
  const triIndices = [];
  for (const face of newFaces) {
    if (face.length < 3) continue;

    // Flächennormale via Kreuzprodukt der ersten zwei Kanten
    const a = newVertices[face[0]], b = newVertices[face[1]], c = newVertices[face[2]];
    const abx = b[0]-a[0], aby = b[1]-a[1], abz = b[2]-a[2];
    const acx = c[0]-a[0], acy = c[1]-a[1], acz = c[2]-a[2];
    const nx = aby*acz - abz*acy;
    const ny = abz*acx - abx*acz;
    const nz = abx*acy - aby*acx;

    // Zentroid der Fläche (≈ Richtung vom Ursprung zur Fläche)
    let cx2 = 0, cy2 = 0, cz2 = 0;
    for (const vi of face) {
      cx2 += newVertices[vi][0];
      cy2 += newVertices[vi][1];
      cz2 += newVertices[vi][2];
    }

    // Dot-Produkt: positiv = Normale zeigt nach außen (gewünscht)
    const outward = nx*cx2 + ny*cy2 + nz*cz2;

    if (outward >= 0) {
      // Normale zeigt nach außen → Reihenfolge beibehalten
      for (let j = 1; j < face.length - 1; j++) {
        triIndices.push(face[0], face[j], face[j + 1]);
      }
    } else {
      // Normale zeigt nach innen → Reihenfolge umkehren
      for (let j = 1; j < face.length - 1; j++) {
        triIndices.push(face[0], face[j + 1], face[j]);
      }
    }
  }

  return {
    vertices: newVertices,   // [[x,y,z], ...] — neue Vertex-Koordinaten
    faces: newFaces,         // [[v0,v1,...], ...] — Polygon-Flächen (für nächste Iteration)
    triIndices: new Uint32Array(triIndices), // Triangulierte Indizes (für Rendering)
    coords: flatCoords(newVertices),         // Flat Float64Array (für Transferable)
    deviations,              // Float64Array: Abweichung pro Vertex von der Kugel
    rAvg,                    // Durchschnittsradius nach Normalisierung (≈ 1)
  };
}

// Konvertiert [[x,y,z], ...] in ein flaches Float64Array [x0,y0,z0,x1,y1,z1,...]
// für den Transfer via postMessage (Transferable).
function flatCoords(verts) {
  const arr = new Float64Array(verts.length * 3);
  for (let i = 0; i < verts.length; i++) {
    arr[i * 3] = verts[i][0];
    arr[i * 3 + 1] = verts[i][1];
    arr[i * 3 + 2] = verts[i][2];
  }
  return arr;
}

// ============================================================================
// Worker-Zustand
// ============================================================================
// Der Worker pflegt seinen eigenen Zustand (Vertices + Flächen) über
// Iterationen hinweg. Der Main Thread sendet nur { iter: N } und bekommt
// das Ergebnis zurück. Kein Hin-und-Her von Vertex-Daten.
let currentVertices = CUBE_VERTS;
let currentFaces = CUBE_FACES;

// ============================================================================
// Message Handler
// ============================================================================
// Empfängt { iter: N } vom Main Thread.
//   iter = 0: Gibt den Ausgangswürfel zurück (Reset).
//   iter > 0: Berechnet die nächste Rektifikation und gibt Ergebnis zurück.
//
// Antwortet mit:
//   type: 'progress' — Fortschrittsmeldung während der Berechnung
//   type: 'result'   — Fertiges Ergebnis mit Koordinaten, Indizes, Deviations, Statistiken
self.onmessage = async function(e) {
  try {
    const iter = e.data.iter;
    const t0 = performance.now();

    if (iter === 0) {
      // Ausgangswürfel zurückgeben (keine Berechnung nötig)
      currentVertices = CUBE_VERTS;
      currentFaces = CUBE_FACES;
      const coords = flatCoords(currentVertices);
      // Würfel-Triangulierung: 6 Quadrate × 2 Dreiecke = 12 Dreiecke
      const triIndices = new Uint32Array([
        0,2,6, 0,6,4,  // -z (hinten)
        1,5,7, 1,7,3,  // +z (vorne)
        0,4,5, 0,5,1,  // -y (unten)
        2,3,7, 2,7,6,  // +y (oben)
        0,1,3, 0,3,2,  // -x (links)
        4,6,7, 4,7,5   // +x (rechts)
      ]);
      // Alle Würfel-Ecken gleich weit vom Ursprung → deviation = 0
      const deviations = new Float64Array(8).fill(0);
      self.postMessage({
        type: 'result', iter, coords, triIndices, deviations,
        rAvg: Math.sqrt(3), // Abstand Würfelecke zum Ursprung = √3
        duration: 0,
        vertCount: 8, edgeCount: 12, faceCount: 6
      }, [coords.buffer, triIndices.buffer, deviations.buffer]);
      return;
    }

    // Rektifikation berechnen, mit Fortschrittsmeldungen
    const result = await rectifyTopological(currentVertices, currentFaces, (phase, done, total) => {
      self.postMessage({ type: 'progress', iter, phase, done, total });
    });

    // Zustand aktualisieren für die nächste Iteration
    currentVertices = result.vertices;
    currentFaces = result.faces;

    const duration = performance.now() - t0;

    // Kantenanzahl exakt aus der Topologie berechnen
    // (jede Kante kommt in genau 2 Flächen vor)
    const edgeSet = new Set();
    for (const face of currentFaces) {
      for (let j = 0; j < face.length; j++) {
        edgeSet.add(edgeKey(face[j], face[(j + 1) % face.length]));
      }
    }

    // Ergebnis an Main Thread senden
    // Transferable Arrays (coords, triIndices, deviations) werden ohne
    // Kopie übergeben — der Worker kann sie danach nicht mehr lesen.
    self.postMessage({
      type: 'result', iter,
      coords: result.coords,           // Float64Array: Vertex-Positionen
      triIndices: result.triIndices,    // Uint32Array: Dreieck-Indizes
      deviations: result.deviations,    // Float64Array: Abweichung von Kugel
      rAvg: result.rAvg,               // Durchschnittsradius
      duration,                         // Berechnungsdauer in ms
      vertCount: currentVertices.length, // V' = E (Euler)
      edgeCount: edgeSet.size,           // E' = 2E (Euler)
      faceCount: currentFaces.length,    // F' = V + F (Euler)
    }, [result.coords.buffer, result.triIndices.buffer, result.deviations.buffer]);

  } catch (err) {
    console.error('Worker error:', err.message, err.stack);
    // Leeres Ergebnis senden, damit der Main Thread nicht hängt
    self.postMessage({
      type: 'result', iter: e.data.iter,
      coords: new Float64Array(0), triIndices: new Uint32Array(0),
      deviations: new Float64Array(0), rAvg: 1, duration: 0,
      vertCount: 0, edgeCount: 0, faceCount: 0,
    });
  }
};
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ---- Worker-Kommunikation ----
// Der Worker berechnet die Rektifikation asynchron in einem eigenen Thread.
// Wir senden nur { iter: N } und bekommen Koordinaten, Dreieck-Indizes,
// Abweichungen und Statistiken zurück.
// Date.now() im URL verhindert Browser-Caching des Worker-Scripts.
// ---- Inline Worker ----
const workerBlob = new Blob(
  [document.getElementById('worker-src').textContent],
  { type: 'application/javascript' }
);
const worker = new Worker(URL.createObjectURL(workerBlob));
const pendingCallbacks = new Map();  // iter → callback wenn Ergebnis da
const computeStartTimes = new Map(); // iter → performance.now() Startzeitpunkt

worker.onmessage = (e) => {
  // Fortschrittsmeldungen aktualisieren die Anzeige ohne Rendering
  if (e.data.type === 'progress') {
    const { iter, phase, done, total } = e.data;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('s-progress').textContent =
      `Iter ${iter}: ${phase} ${pct}%`;
    return;
  }

  // Ergebnis empfangen und in history speichern
  const { iter, coords, triIndices, deviations, rAvg, vertCount, edgeCount, faceCount } = e.data;
  const elapsed = computeStartTimes.has(iter) ? performance.now() - computeStartTimes.get(iter) : null;
  computeStartTimes.delete(iter);

  // Float64-Koordinaten → THREE.Vector3 für Rendering
  const vertices = [];
  for (let i = 0; i < coords.length; i += 3) {
    vertices.push(new THREE.Vector3(coords[i], coords[i+1], coords[i+2]));
  }
  history[iter] = {
    vertices,                                           // THREE.Vector3[] für Rendering
    triIndices: new Uint32Array(triIndices),             // Dreieck-Indizes (BufferGeometry)
    deviations: deviations ? new Float64Array(deviations) : null, // Abweichung pro Vertex
    rAvg: rAvg || 1,                                    // Best-Fit-Kugelradius
    duration: elapsed,                                  // Berechnungsdauer in ms
    vertCount, edgeCount, faceCount,                    // Exakte topologische Zählung
  };
  pendingCompute.delete(iter);
  document.getElementById('s-progress').textContent = '';
  updatePrecomp();

  // Callback ausführen falls jemand auf dieses Ergebnis wartet
  const cb = pendingCallbacks.get(iter);
  if (cb) { pendingCallbacks.delete(iter); cb(); }

  // Nächste Iteration vorberechnen
  precomputeNext();
};

// Berechnung einer Iteration beim Worker anfordern
function requestCompute(iter) {
  if (history[iter] || pendingCompute.has(iter)) return;
  pendingCompute.add(iter);
  computeStartTimes.set(iter, performance.now());
  worker.postMessage({ iter });
}

// ---- Three.js Szene ----
const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(3, 2.5, 3);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.setClearColor(0x1a1a2e); // Dunkles Blau als Hintergrund

container.appendChild(renderer.domElement);

// Beleuchtung: ambientes Licht + 2 gerichtete Lichtquellen
scene.add(new THREE.AmbientLight(0x404060, 1.5));
const dl1 = new THREE.DirectionalLight(0xffffff, 1.2);
dl1.position.set(5, 8, 5);  // oben rechts vorne
scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x8888ff, 0.6);
dl2.position.set(-5, -2, -5); // unten links hinten (bläulich)
scene.add(dl2);

// ---- Zustand ----
const MAX_ITER = 20; // Maximale Iterationstiefe

// history[i] enthält das Ergebnis der i-ten Iteration (vom Worker berechnet).
// history[0] = Ausgangswürfel, wird ebenfalls vom Worker geliefert.
const history = [];
const pendingCompute = new Set(); // Iterationen die gerade berechnet werden
let currentIdx = 0;
const meshGroup = new THREE.Group();
scene.add(meshGroup);
const palette = [0x4a90d9, 0x50c878, 0xe8a838, 0xd94a6b, 0x9b59b6, 0x1abc9c, 0xe67e22, 0x3498db];

// Aktualisiert die "Vorberechnet: X / MAX" Anzeige in der Stats-Zeile
function updatePrecomp() {
  document.getElementById('s-precomp').textContent = history.length - 1;
}

// Formatiert Millisekunden als "42ms", "7s" oder "1:23"
function formatDuration(ms) {
  if (ms < 1000) return `${Math.round(ms)}ms`;
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return `${sec}s`;
  const min = Math.floor(sec / 60);
  const remSec = sec % 60;
  return `${min}:${String(remSec).padStart(2, '0')}`;
}

// Berechnet die nächste noch fehlende Iteration im Hintergrund.
// Wird nach jedem Worker-Ergebnis aufgerufen (Kette: 0 → 1 → 2 → ...).
function precomputeNext() {
  for (let i = 0; i <= MAX_ITER; i++) {
    if (!history[i] && !pendingCompute.has(i) && (i === 0 || history[i-1])) {
      requestCompute(i);
      return;
    }
  }
}
precomputeNext(); // Startet die Vorberechnung ab Iteration 0

// ============================================================================
// Rendering
// ============================================================================
// Baut die 3D-Szene für die aktuelle Iteration:
//   - Iter 0-10: Polyeder mit Flächen, Kanten und Vertex-Punkten
//   - Ab Iter 11: Best-Fit-Kugel als Referenz + Vertex-Punkte
// Vertex-Punkte sind farbcodiert nach Abweichung von der Best-Fit-Kugel:
//   - Rot = außerhalb der Kugel (Beule)
//   - Grün = innerhalb der Kugel (Delle)
//   - Grau = auf der Kugel (kaum Abweichung)

function buildMesh(data) {
  // Alte Meshes aufräumen (GPU-Speicher freigeben)
  while (meshGroup.children.length) {
    const c = meshGroup.children[0];
    c.geometry?.dispose();
    c.material?.dispose();
    meshGroup.remove(c);
  }

  const { vertices, triIndices, deviations, rAvg } = data;
  const color = palette[currentIdx % palette.length];
  const sphereRadius = rAvg || 1;

  // ---- Körper / Kugel rendern ----
  if (currentIdx <= 10 && triIndices && triIndices.length > 0) {
    // POLYEDER-MODUS (Iter 0-10):
    // Flächen aus triangulierten Polygonen (vom Worker), Kanten via EdgesGeometry

    // Vertex-Positionen als Float32Array (Three.js-Format)
    const positions = new Float32Array(vertices.length * 3);
    for (let i = 0; i < vertices.length; i++) {
      positions[i*3] = vertices[i].x; positions[i*3+1] = vertices[i].y; positions[i*3+2] = vertices[i].z;
    }
    const polyGeom = new THREE.BufferGeometry();
    polyGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    polyGeom.setIndex(new THREE.BufferAttribute(triIndices, 1));
    polyGeom.computeVertexNormals(); // Für korrekte Beleuchtung

    // Zwei-Pass-Rendering für korrektes Alpha-Blending bei transparenten Flächen:
    // Pass 1: Rückseiten (dunkler, zuerst gerendert → hinter Vorderseiten)
    meshGroup.add(new THREE.Mesh(polyGeom, new THREE.MeshPhysicalMaterial({
      color, transparent: true, opacity: 0.15, roughness: 0.3, metalness: 0.1,
      side: THREE.BackSide, depthWrite: false,
    })));
    // Pass 2: Vorderseiten (heller, darüber gerendert)
    meshGroup.add(new THREE.Mesh(polyGeom, new THREE.MeshPhysicalMaterial({
      color, transparent: true, opacity: 0.25, roughness: 0.3, metalness: 0.1,
      side: THREE.FrontSide, depthWrite: false,
    })));
    // Kanten als weiße Linien (EdgesGeometry extrahiert nur echte Kanten, keine Diagonalen)
    meshGroup.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(polyGeom, 1),
      new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1.5, transparent: true, opacity: 0.7 })
    ));

  } else {
    // KUGEL-MODUS (ab Iter 11):
    // Best-Fit-Kugel als Referenzkörper — zeigt wie weit die Vertices
    // von der idealen Kugel abweichen
    const sphereGeom = new THREE.SphereGeometry(sphereRadius, 64, 48);
    meshGroup.add(new THREE.Mesh(sphereGeom, new THREE.MeshPhysicalMaterial({
      color: 0x6699cc, transparent: true, opacity: 0.6, roughness: 0.3, metalness: 0.1, side: THREE.DoubleSide,
    })));
    // Dezentes Kugel-Wireframe als Orientierungshilfe
    meshGroup.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(sphereGeom, 15),
      new THREE.LineBasicMaterial({ color: 0x88aacc, transparent: true, opacity: 0.2 })
    ));
  }

  // ---- Farbcodierte Vertex-Punkte ----

  // Maximale absolute Abweichung bestimmen (für Farbskalierung 0..1)
  let maxAbsDev = 0;
  if (deviations) {
    for (let i = 0; i < deviations.length; i++) {
      const abs = Math.abs(deviations[i]);
      if (abs > maxAbsDev) maxAbsDev = abs;
    }
  }

  // Deviation → Farbe: grau bei 0, kräftig rot/grün bei maximaler Abweichung
  function devColor(dev) {
    const t = maxAbsDev > 0 ? Math.min(1, Math.abs(dev) / maxAbsDev) : 0;
    if (dev < 0) {
      // Außerhalb der Kugel: grau → rot
      return new THREE.Color(0.4 + 0.6 * t, 0.4 * (1 - t), 0.4 * (1 - t));
    } else {
      // Innerhalb der Kugel: grau → grün
      return new THREE.Color(0.4 * (1 - t), 0.4 + 0.6 * t, 0.4 * (1 - t));
    }
  }

  // Bei hohen Iterationen (>49.152 Vertices) zufälliges Sampling
  // für gleichmäßige Verteilung und Performance
  const MAX_DOTS = 49152;
  const dotGeom = new THREE.SphereGeometry(0.003, 4, 4);
  const candidates = Array.from({ length: vertices.length }, (_, i) => ({ i }));
  if (candidates.length > MAX_DOTS) {
    // Fisher-Yates Shuffle → ersten MAX_DOTS nehmen = gleichmäßiges Sample
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    candidates.length = MAX_DOTS;
  }

  // Jeden Punkt als kleine Kugel mit individueller Farbe rendern
  for (const { i } of candidates) {
    const mat = new THREE.MeshBasicMaterial({ color: devColor(deviations ? deviations[i] : 1) });
    const dot = new THREE.Mesh(dotGeom, mat);
    dot.position.copy(vertices[i]);
    meshGroup.add(dot);
  }
  document.getElementById('s-outliers').textContent = candidates.length.toLocaleString();

  // ---- Abweichungs-Statistik ----
  // Min/Max Abweichung als Prozent des Kugelradius
  if (deviations && deviations.length > 0) {
    let minDev = Infinity, maxDev = -Infinity;
    for (let i = 0; i < deviations.length; i++) {
      if (deviations[i] < minDev) minDev = deviations[i];
      if (deviations[i] > maxDev) maxDev = deviations[i];
    }
    const r = sphereRadius || 1;
    const minPct = (minDev / r * 100).toFixed(3).replace('.', ',');
    const maxPct = (maxDev / r * 100).toFixed(3).replace('.', ',');
    document.getElementById('s-dev').textContent = `${minPct}% .. +${maxPct}%`;
  } else {
    document.getElementById('s-dev').textContent = '-';
  }

  updateStats(false);
}

// Aktualisiert die Stats-Zeile (Ecken, Kanten, Flächen, Dauer)
function updateStats(computing) {
  const h = history[currentIdx];
  document.getElementById('s-iter').textContent = currentIdx;
  document.getElementById('s-verts').textContent = h?.vertCount?.toLocaleString() ?? '-';
  document.getElementById('s-edges').textContent = h?.edgeCount?.toLocaleString() ?? '-';
  document.getElementById('s-faces').textContent = h?.faceCount?.toLocaleString() ?? '-';
  const d = h?.duration;
  document.getElementById('s-time').textContent = d != null ? formatDuration(d) : '-';
  // Nur zurücksetzen wenn noch berechnet wird — buildMesh setzt die Werte danach
  if (computing) {
    document.getElementById('s-outliers').textContent = '-';
    document.getElementById('s-dev').textContent = '-';
  }
  // Sanduhr ⏳ anzeigen wenn noch berechnet wird
  document.getElementById('iteration-label').textContent =
    computing ? `Iteration ${currentIdx} \u23f3` : `Iteration ${currentIdx}`;
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx >= MAX_ITER;
}

// Zeigt die aktuelle Iteration an. Falls noch nicht berechnet,
// wird eine Sanduhr angezeigt und beim Eintreffen des Ergebnisses gerendert.
function showCurrent() {
  updateStats(!history[currentIdx]);

  if (cached) {
    buildMesh(history[currentIdx]);
  } else {
    if (!pendingCompute.has(currentIdx)) requestCompute(currentIdx);
    pendingCallbacks.set(currentIdx, () => {
      if (history[currentIdx]) buildMesh(history[currentIdx]);
    });
  }
}

// ---- Steuerung ----
function goNext() {
  if (currentIdx >= MAX_ITER) return;
  currentIdx++;
  showCurrent();
}
function goPrev() { if (currentIdx > 0) { currentIdx--; showCurrent(); } }
function resetAll() { currentIdx = 0; showCurrent(); stopAuto(); }

// Auto-Modus: automatisch alle 2,5s zur nächsten Iteration
let autoInterval = null;
function toggleAuto() {
  if (autoInterval) { stopAuto(); return; }
  document.getElementById('btn-auto').textContent = 'Stop \u23f8';
  autoInterval = setInterval(() => { if (currentIdx >= MAX_ITER) { stopAuto(); return; } goNext(); }, 2500);
}
function stopAuto() {
  clearInterval(autoInterval); autoInterval = null;
  document.getElementById('btn-auto').textContent = 'Auto \u25b6';
}

// Button-Events: sowohl pointerdown als auch click für maximale Kompatibilität
// (pointerdown reagiert sofort, click als Fallback)
function btnEvent(id, fn) {
  const el = document.getElementById(id);
  let handled = false;
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); handled = true; fn(); });
  el.addEventListener('click', () => { if (!handled) fn(); handled = false; });
}
btnEvent('btn-next', () => { stopAuto(); goNext(); });
btnEvent('btn-prev', () => { stopAuto(); goPrev(); });
btnEvent('btn-reset', resetAll);
btnEvent('btn-auto', toggleAuto);

// Tastatursteuerung
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); stopAuto(); goNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); stopAuto(); goPrev(); }
  else if (e.key === 'r' || e.key === 'R') resetAll();
  else if (e.key === 'a' || e.key === 'A') toggleAuto();
});

// Canvas-Größe an Fenstergröße anpassen
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

showCurrent(); // Initiale Anzeige (wartet auf Worker-Ergebnis für Iter 0)

// ---- Kamera-Rotation ----
// Sphärische Koordinaten: theta (horizontal), phi (vertikal), radius (Zoom)
// Auto-Rotation dreht theta langsam, pausiert bei Mausinteraktion für 3s
let theta = 0.7, phi = 0.6, radius = 4;
let dragging = false, lastX = 0, lastY = 0, autoRotate = true;
let autoRotateTimer = null;

function pauseAutoRotate() {
  autoRotate = false;
  clearTimeout(autoRotateTimer);
  autoRotateTimer = setTimeout(() => { autoRotate = true; }, 3000);
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  pauseAutoRotate();
});
window.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  theta += (e.clientX - lastX) * 0.007;
  phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi - (e.clientY - lastY) * 0.007));
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('pointerup', () => { dragging = false; });
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  radius = Math.max(1.5, Math.min(10, radius + e.deltaY * 0.005));
  pauseAutoRotate();
}, { passive: false });

// Pinch-to-zoom on touch devices
let lastPinchDist = 0;
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });
renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastPinchDist > 0) {
      radius = Math.max(1.5, Math.min(10, radius * (lastPinchDist / dist)));
      pauseAutoRotate();
    }
    lastPinchDist = dist;
  }
}, { passive: true });

// Render-Loop: Kamera kreist um den Ursprung (sphärische Koordinaten)
(function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) theta += 0.003; // Langsame Auto-Rotation
  // Sphärische → kartesische Koordinaten
  camera.position.set(
    radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
  camera.lookAt(0, 0, 0); // Immer auf Ursprung schauen
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
