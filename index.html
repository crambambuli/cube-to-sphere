<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Iterative Eckenabschneidung eines Würfels</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #header {
    text-align: center;
    padding: 14px 0 6px;
    flex-shrink: 0;
  }
  #header h1 { font-size: 1.3rem; color: #e0e0ff; }
  #header p { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
  #scene-container {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  #stats {
    position: absolute;
    top: 8px;
    right: 12px;
    background: rgba(16,33,64,0.85);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    line-height: 1.7;
    border: 1px solid #0f3460;
    z-index: 5;
    pointer-events: none;
  }
  #stats span { color: #7ec8e3; font-weight: bold; }
  #controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
    padding: 14px 0;
    flex-shrink: 0;
    background: #1a1a2e;
  }
  button {
    background: #16213e;
    color: #e0e0ff;
    border: 1px solid #0f3460;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { background: #0f3460; }
  button:disabled { opacity: 0.4; cursor: default; }
  #iteration-label {
    font-size: 1.1rem;
    color: #7ec8e3;
    font-weight: bold;
    min-width: 120px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Iterative Eckenabschneidung</h1>
  <p>Seiten halbieren, Ecken abschneiden &mdash; Pfeiltasten oder Buttons</p>
</div>

<div id="scene-container">
  <div id="stats">
    Iteration: <span id="s-iter">0</span><br>
    Ecken: <span id="s-verts">8</span><br>
    Kanten: <span id="s-edges">12</span><br>
    Flächen: <span id="s-faces">6</span>
  </div>
</div>

<div id="controls">
  <button id="btn-reset">Reset</button>
  <button id="btn-prev" disabled>&larr; Zurück</button>
  <div id="iteration-label">Iteration 0</div>
  <button id="btn-next">Weiter &rarr;</button>
  <button id="btn-auto">Auto &#9654;</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { ConvexGeometry } from 'three/addons/geometries/ConvexGeometry.js';

const container = document.getElementById('scene-container');

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(3, 2.5, 3);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.setClearColor(0x1a1a2e);
container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x404060, 1.5));
const dl1 = new THREE.DirectionalLight(0xffffff, 1.2);
dl1.position.set(5, 8, 5);
scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x8888ff, 0.6);
dl2.position.set(-5, -2, -5);
scene.add(dl2);

// ---- Geometry ----
const EPS = 1e-6;

function makeEdgeKey(i, j) {
  return i < j ? `${i}_${j}` : `${j}_${i}`;
}

function analyzeHull(vertices) {
  const geom = new ConvexGeometry(vertices);
  const idx = geom.index ? geom.index.array : null;
  const pos = geom.attributes.position;

  function findVertex(x, y, z) {
    let bestIdx = 0, bestDist = Infinity;
    for (let i = 0; i < vertices.length; i++) {
      const dx = vertices[i].x - x, dy = vertices[i].y - y, dz = vertices[i].z - z;
      const d = dx * dx + dy * dy + dz * dz;
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    return bestIdx;
  }

  const triCount = idx ? idx.length / 3 : pos.count / 3;
  const triangles = [];
  for (let t = 0; t < triCount; t++) {
    const ia = idx ? idx[t * 3] : t * 3;
    const ib = idx ? idx[t * 3 + 1] : t * 3 + 1;
    const ic = idx ? idx[t * 3 + 2] : t * 3 + 2;
    const pa = new THREE.Vector3(pos.getX(ia), pos.getY(ia), pos.getZ(ia));
    const pb = new THREE.Vector3(pos.getX(ib), pos.getY(ib), pos.getZ(ib));
    const pc = new THREE.Vector3(pos.getX(ic), pos.getY(ic), pos.getZ(ic));
    const va = findVertex(pa.x, pa.y, pa.z);
    const vb = findVertex(pb.x, pb.y, pb.z);
    const vc = findVertex(pc.x, pc.y, pc.z);
    const n = new THREE.Vector3().subVectors(pb, pa).cross(new THREE.Vector3().subVectors(pc, pa)).normalize();
    triangles.push({ verts: [va, vb, vc], normal: n });
  }

  const edgeTriNormals = new Map();
  for (const tri of triangles) {
    const [a, b, c] = tri.verts;
    for (const [i, j] of [[a, b], [b, c], [c, a]]) {
      const key = makeEdgeKey(i, j);
      if (!edgeTriNormals.has(key)) edgeTriNormals.set(key, []);
      edgeTriNormals.get(key).push(tri.normal);
    }
  }

  const realEdges = [];
  for (const [key, normals] of edgeTriNormals) {
    if (normals.length === 1) {
      realEdges.push(key.split('_').map(Number));
    } else if (normals.length === 2) {
      if (Math.abs(normals[0].dot(normals[1])) < 1 - 1e-3) {
        realEdges.push(key.split('_').map(Number));
      }
    } else {
      const n0 = normals[0];
      if (!normals.every(n => Math.abs(n0.dot(n)) > 1 - 1e-3)) {
        realEdges.push(key.split('_').map(Number));
      }
    }
  }

  const faceNormalSet = new Set();
  for (const tri of triangles) {
    const n = tri.normal;
    faceNormalSet.add(`${n.x.toFixed(3)}_${n.y.toFixed(3)}_${n.z.toFixed(3)}`);
  }

  geom.dispose();
  return { edges: realEdges, faceCount: faceNormalSet.size };
}

function rectify(vertices) {
  const { edges } = analyzeHull(vertices);
  const midpoints = [];
  const seen = new Set();
  for (const [a, b] of edges) {
    const mid = new THREE.Vector3().addVectors(vertices[a], vertices[b]).multiplyScalar(0.5);
    const key = `${mid.x.toFixed(6)}_${mid.y.toFixed(6)}_${mid.z.toFixed(6)}`;
    if (!seen.has(key)) { seen.add(key); midpoints.push(mid); }
  }
  const maxR = midpoints.reduce((m, v) => Math.max(m, v.length()), 0);
  if (maxR > EPS) for (const v of midpoints) v.multiplyScalar(1.0 / maxR);
  return midpoints;
}

function makeCube() {
  const s = 1;
  return [
    new THREE.Vector3(-s,-s,-s), new THREE.Vector3(-s,-s,s),
    new THREE.Vector3(-s,s,-s), new THREE.Vector3(-s,s,s),
    new THREE.Vector3(s,-s,-s), new THREE.Vector3(s,-s,s),
    new THREE.Vector3(s,s,-s), new THREE.Vector3(s,s,s),
  ];
}

// ---- State ----
const history = [makeCube()];
let currentIdx = 0;
const meshGroup = new THREE.Group();
scene.add(meshGroup);

const palette = [0x4a90d9, 0x50c878, 0xe8a838, 0xd94a6b, 0x9b59b6, 0x1abc9c, 0xe67e22, 0x3498db];

function buildMesh(vertices) {
  while (meshGroup.children.length) {
    const c = meshGroup.children[0];
    c.geometry?.dispose();
    c.material?.dispose();
    meshGroup.remove(c);
  }

  const solidGeom = new ConvexGeometry(vertices);
  meshGroup.add(new THREE.Mesh(solidGeom, new THREE.MeshPhysicalMaterial({
    color: palette[currentIdx % palette.length],
    transparent: true, opacity: 0.55, roughness: 0.3, metalness: 0.1, side: THREE.DoubleSide,
  })));

  meshGroup.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(solidGeom, 1),
    new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1.5, transparent: true, opacity: 0.7 })
  ));

  const dotGeom = new THREE.SphereGeometry(0.018, 8, 8);
  const dotMat = new THREE.MeshBasicMaterial({ color: 0xffff88 });
  for (const v of vertices) {
    const dot = new THREE.Mesh(dotGeom, dotMat);
    dot.position.copy(v);
    meshGroup.add(dot);
  }

  const { edges: realEdges, faceCount } = analyzeHull(vertices);
  document.getElementById('s-iter').textContent = currentIdx;
  document.getElementById('s-verts').textContent = vertices.length;
  document.getElementById('s-edges').textContent = realEdges.length;
  document.getElementById('s-faces').textContent = faceCount;
  document.getElementById('iteration-label').textContent = `Iteration ${currentIdx}`;
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx >= 20;
}

function showCurrent() { buildMesh(history[currentIdx]); }

function goNext() {
  if (currentIdx >= 20) return;
  currentIdx++;
  if (currentIdx >= history.length) history.push(rectify(history[history.length - 1]));
  showCurrent();
}
function goPrev() { if (currentIdx > 0) { currentIdx--; showCurrent(); } }
function resetAll() {
  currentIdx = 0; history.length = 1; history[0] = makeCube();
  showCurrent(); stopAuto();
}

let autoInterval = null;
function toggleAuto() {
  if (autoInterval) { stopAuto(); return; }
  document.getElementById('btn-auto').textContent = 'Stop \u23f8';
  autoInterval = setInterval(() => { if (currentIdx >= 20) { stopAuto(); return; } goNext(); }, 1200);
}
function stopAuto() {
  clearInterval(autoInterval); autoInterval = null;
  document.getElementById('btn-auto').textContent = 'Auto \u25b6';
}

// ---- Events (both pointerdown and click for max compatibility) ----
function btnEvent(id, fn) {
  const el = document.getElementById(id);
  let handled = false;
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); handled = true; fn(); });
  el.addEventListener('click', () => { if (!handled) fn(); handled = false; });
}
btnEvent('btn-next', () => { stopAuto(); goNext(); });
btnEvent('btn-prev', () => { stopAuto(); goPrev(); });
btnEvent('btn-reset', resetAll);
btnEvent('btn-auto', toggleAuto);

window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); stopAuto(); goNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); stopAuto(); goPrev(); }
  else if (e.key === 'r' || e.key === 'R') resetAll();
  else if (e.key === 'a' || e.key === 'A') toggleAuto();
});

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

showCurrent();

// Auto-rotate camera around the object
let angle = 0.7;
(function animate() {
  requestAnimationFrame(animate);
  angle += 0.003;
  camera.position.set(Math.cos(angle) * 3.5, 2, Math.sin(angle) * 3.5);
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
