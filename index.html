<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
<link rel="apple-touch-icon" sizes="64x64" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Interaktive 3D-Visualisierung: Einen Würfel iterativ rektifizieren und beobachten, wie er zur Kugel konvergiert.">
<meta property="og:title" content="Vom Würfel zur Kugel">
<meta property="og:description" content="Interaktive 3D-Visualisierung: Einen Würfel iterativ rektifizieren und beobachten, wie er zur Kugel konvergiert.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://crambambuli.github.io/cube-to-sphere/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://crambambuli.github.io/cube-to-sphere/">
<title>Iterative Eckenabschneidung eines Würfels</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    touch-action: none;
  }
  #header {
    text-align: center;
    padding: 10px 8px 4px;
    flex-shrink: 0;
  }
  #header h1 { font-size: clamp(0.9rem, 3.5vw, 1.3rem); color: #e0e0ff; }
  #header p { font-size: clamp(0.65rem, 2.5vw, 0.8rem); color: #aaa; margin-top: 2px; }
  #scene-container {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  #stats {
    display: flex;
    gap: 6px 14px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 4px 8px;
    font-size: clamp(0.6rem, 2.2vw, 0.8rem);
    flex-shrink: 0;
  }
  #stats span { color: #7ec8e3; font-weight: bold; }
  #controls {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
    padding: 10px 6px;
    flex-shrink: 0;
    background: #1a1a2e;
    flex-wrap: wrap;
    z-index: 10;
    position: relative;
  }
  button {
    background: #16213e;
    color: #e0e0ff;
    border: 1px solid #0f3460;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: clamp(0.8rem, 3vw, 0.95rem);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover { background: #0f3460; }
  button:active { background: #0f3460; }
  button:disabled { opacity: 0.4; cursor: default; }
  #iteration-label {
    font-size: clamp(0.85rem, 3vw, 1.1rem);
    color: #7ec8e3;
    font-weight: bold;
    min-width: 100px;
    text-align: center;
  }
  @media (max-width: 480px) {
    #header { padding: 6px 4px 2px; }
    #controls { gap: 4px; padding: 8px 4px; }
    button { padding: 8px 10px; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>Iterative Eckenabschneidung</h1>
  <p>Seiten halbieren, Ecken abschneiden &mdash; Ziehen zum Drehen, Pinch/Scroll zum Zoomen</p>
</div>

<div id="stats">
  Iteration: <span id="s-iter">0</span> &middot;
  Ecken: <span id="s-verts">8</span> &middot;
  Kanten: <span id="s-edges">12</span> &middot;
  Flächen: <span id="s-faces">6</span> &middot;
  Dauer: <span id="s-time">-</span> &middot;
  Outlier: <span id="s-outliers">8</span> &middot;
  Abweichung: <span id="s-dev">-</span> &middot;
  Vorberechnet: <span id="s-precomp">0</span>/<span id="s-max">20</span> &middot;
  <span id="s-progress"></span>
</div>

<div id="scene-container"></div>

<div id="controls">
  <button id="btn-reset">Reset</button>
  <button id="btn-prev" disabled>&larr; Zurück</button>
  <div id="iteration-label">Iteration 0</div>
  <button id="btn-next">Weiter &rarr;</button>
  <button id="btn-auto">Auto &#9654;</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ---- Worker ----
const worker = new Worker('worker.js?v=' + Date.now());
const pendingCallbacks = new Map();
const computeStartTimes = new Map();

worker.onmessage = (e) => {
  if (e.data.type === 'progress') {
    const { iter, phase, done, total } = e.data;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('s-progress').textContent =
      `Iter ${iter}: ${phase} ${pct}%`;
    return;
  }

  const { iter, coords, triIndices, deviations, rAvg, vertCount, edgeCount, faceCount } = e.data;
  const elapsed = computeStartTimes.has(iter) ? performance.now() - computeStartTimes.get(iter) : null;
  computeStartTimes.delete(iter);
  const vertices = [];
  for (let i = 0; i < coords.length; i += 3) {
    vertices.push(new THREE.Vector3(coords[i], coords[i+1], coords[i+2]));
  }
  history[iter] = {
    vertices, triIndices: new Uint32Array(triIndices),
    deviations: deviations ? new Float64Array(deviations) : null,
    rAvg: rAvg || 1, duration: elapsed,
    vertCount, edgeCount, faceCount,
  };
  pendingCompute.delete(iter);
  document.getElementById('s-progress').textContent = '';
  updatePrecomp();

  const cb = pendingCallbacks.get(iter);
  if (cb) { pendingCallbacks.delete(iter); cb(); }

  precomputeNext();
};

function requestCompute(iter) {
  if (history[iter] || pendingCompute.has(iter)) return;
  pendingCompute.add(iter);
  computeStartTimes.set(iter, performance.now());
  worker.postMessage({ iter });
}

// ---- Scene ----
const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(3, 2.5, 3);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.setClearColor(0x1a1a2e);
container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x404060, 1.5));
const dl1 = new THREE.DirectionalLight(0xffffff, 1.2);
dl1.position.set(5, 8, 5);
scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x8888ff, 0.6);
dl2.position.set(-5, -2, -5);
scene.add(dl2);

// ---- State ----
const MAX_ITER = 20;
// Worker liefert alle Iterationen (inkl. iter=0 → Cube)
const history = [];
const pendingCompute = new Set();
let currentIdx = 0;
const meshGroup = new THREE.Group();
scene.add(meshGroup);
const palette = [0x4a90d9, 0x50c878, 0xe8a838, 0xd94a6b, 0x9b59b6, 0x1abc9c, 0xe67e22, 0x3498db];

function updatePrecomp() {
  document.getElementById('s-precomp').textContent = history.length - 1;
}

function formatDuration(ms) {
  if (ms < 1000) return `${Math.round(ms)}ms`;
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return `${sec}s`;
  const min = Math.floor(sec / 60);
  const remSec = sec % 60;
  return `${min}:${String(remSec).padStart(2, '0')}`;
}

function precomputeNext() {
  for (let i = 0; i <= MAX_ITER; i++) {
    if (!history[i] && !pendingCompute.has(i) && (i === 0 || history[i-1])) {
      requestCompute(i);
      return;
    }
  }
}
precomputeNext();

// ---- Rendering ----
const OUTLIER_THRESHOLD = 0.01;

function buildMesh(data) {
  while (meshGroup.children.length) {
    const c = meshGroup.children[0];
    c.geometry?.dispose();
    c.material?.dispose();
    meshGroup.remove(c);
  }

  const { vertices, triIndices, deviations, rAvg } = data;
  const color = palette[currentIdx % palette.length];
  const sphereRadius = rAvg || 1;

  // Referenz-Kugel (Best-Fit-Radius)
  const sphereGeom = new THREE.SphereGeometry(sphereRadius, 64, 48);
  meshGroup.add(new THREE.Mesh(sphereGeom, new THREE.MeshPhysicalMaterial({
    color, transparent: true, opacity: 0.35, roughness: 0.2, metalness: 0.2, side: THREE.DoubleSide,
  })));
  // Kugel-Wireframe
  meshGroup.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(sphereGeom, 15),
    new THREE.LineBasicMaterial({ color: 0x88aacc, transparent: true, opacity: 0.2 })
  ));

  // Outlier bestimmen: Punkte die signifikant von der Kugel abweichen
  const dotGeom = new THREE.SphereGeometry(0.004, 4, 4);
  const dotMatOuter = new THREE.MeshBasicMaterial({ color: 0xff4444 }); // rot: außerhalb
  const dotMatInner = new THREE.MeshBasicMaterial({ color: 0x44ff88 }); // grün: innerhalb

  // Prüfen ob es überhaupt Outlier gibt
  let maxAbsDev = 0;
  if (deviations) {
    for (let i = 0; i < deviations.length; i++) {
      const abs = Math.abs(deviations[i]);
      if (abs > maxAbsDev) maxAbsDev = abs;
    }
  }
  const showAll = !deviations || maxAbsDev <= OUTLIER_THRESHOLD;

  const MAX_OUTLIERS = 32768; // 2^15

  // Kandidaten sammeln
  const candidates = [];
  for (let i = 0; i < vertices.length; i++) {
    const absDev = deviations ? Math.abs(deviations[i]) : 1;
    if (showAll || absDev > OUTLIER_THRESHOLD) {
      candidates.push({ i, absDev });
    }
  }

  // Bei zu vielen Kandidaten: zufällige Auswahl
  if (candidates.length > MAX_OUTLIERS) {
    // Fisher-Yates Shuffle, dann abschneiden
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    candidates.length = MAX_OUTLIERS;
  }

  let outlierCount = candidates.length;
  for (const { i } of candidates) {
    const mat = (deviations && deviations[i] < 0) ? dotMatOuter : dotMatInner;
    const dot = new THREE.Mesh(dotGeom, mat);
    dot.position.copy(vertices[i]);
    meshGroup.add(dot);
  }

  document.getElementById('s-outliers').textContent =
    showAll ? `${outlierCount.toLocaleString()} (alle)` : outlierCount.toLocaleString();

  // Min/Max Abweichung normiert auf rAvg
  if (deviations && deviations.length > 0) {
    let minDev = Infinity, maxDev = -Infinity;
    for (let i = 0; i < deviations.length; i++) {
      if (deviations[i] < minDev) minDev = deviations[i];
      if (deviations[i] > maxDev) maxDev = deviations[i];
    }
    const r = sphereRadius || 1;
    const minPct = (minDev / r * 100).toFixed(3);
    const maxPct = (maxDev / r * 100).toFixed(3);
    document.getElementById('s-dev').textContent = `${minPct}% .. +${maxPct}%`;
  } else {
    document.getElementById('s-dev').textContent = '-';
  }

  updateStats(false);
}

function updateStats(computing) {
  const h = history[currentIdx];
  document.getElementById('s-iter').textContent = currentIdx;
  document.getElementById('s-verts').textContent = h?.vertCount?.toLocaleString() ?? '-';
  document.getElementById('s-edges').textContent = h?.edgeCount?.toLocaleString() ?? '-';
  document.getElementById('s-faces').textContent = h?.faceCount?.toLocaleString() ?? '-';
  const d = history[currentIdx]?.duration;
  document.getElementById('s-time').textContent = d != null ? formatDuration(d) : '-';
  document.getElementById('iteration-label').textContent =
    computing ? `Iteration ${currentIdx} \u23f3` : `Iteration ${currentIdx}`;
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx >= MAX_ITER;
}

function showCurrent() {
  if (history[currentIdx]) {
    buildMesh(history[currentIdx]);
  } else {
    updateStats(true);
    if (!pendingCompute.has(currentIdx)) requestCompute(currentIdx);
    pendingCallbacks.set(currentIdx, () => {
      if (history[currentIdx]) buildMesh(history[currentIdx]);
    });
  }
}

// ---- Controls ----
function goNext() {
  if (currentIdx >= MAX_ITER) return;
  currentIdx++;
  showCurrent();
}
function goPrev() { if (currentIdx > 0) { currentIdx--; showCurrent(); } }
function resetAll() { currentIdx = 0; showCurrent(); stopAuto(); }

let autoInterval = null;
function toggleAuto() {
  if (autoInterval) { stopAuto(); return; }
  document.getElementById('btn-auto').textContent = 'Stop \u23f8';
  autoInterval = setInterval(() => { if (currentIdx >= MAX_ITER) { stopAuto(); return; } goNext(); }, 2500);
}
function stopAuto() {
  clearInterval(autoInterval); autoInterval = null;
  document.getElementById('btn-auto').textContent = 'Auto \u25b6';
}

function btnEvent(id, fn) {
  const el = document.getElementById(id);
  let handled = false;
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); handled = true; fn(); });
  el.addEventListener('click', () => { if (!handled) fn(); handled = false; });
}
btnEvent('btn-next', () => { stopAuto(); goNext(); });
btnEvent('btn-prev', () => { stopAuto(); goPrev(); });
btnEvent('btn-reset', resetAll);
btnEvent('btn-auto', toggleAuto);

window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); stopAuto(); goNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); stopAuto(); goPrev(); }
  else if (e.key === 'r' || e.key === 'R') resetAll();
  else if (e.key === 'a' || e.key === 'A') toggleAuto();
});

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

showCurrent();

// ---- Mouse orbit ----
let theta = 0.7, phi = 0.6, radius = 4;
let dragging = false, lastX = 0, lastY = 0, autoRotate = true;
let autoRotateTimer = null;

function pauseAutoRotate() {
  autoRotate = false;
  clearTimeout(autoRotateTimer);
  autoRotateTimer = setTimeout(() => { autoRotate = true; }, 3000);
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  pauseAutoRotate();
});
window.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  theta += (e.clientX - lastX) * 0.007;
  phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi - (e.clientY - lastY) * 0.007));
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('pointerup', () => { dragging = false; });
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  radius = Math.max(1.5, Math.min(10, radius + e.deltaY * 0.005));
  pauseAutoRotate();
}, { passive: false });

// Pinch-to-zoom on touch devices
let lastPinchDist = 0;
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });
renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastPinchDist > 0) {
      radius = Math.max(1.5, Math.min(10, radius * (lastPinchDist / dist)));
      pauseAutoRotate();
    }
    lastPinchDist = dist;
  }
}, { passive: true });

(function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) theta += 0.003;
  camera.position.set(
    radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
